<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href='https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" href='https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'>
</head>
<body>
    <div class="auth-section">
        <div class="forgot-card">
            
            <div class="forgot-icons"><i class="fi fi-rr-lock"></i></div>

            <h1 class="auth-title">New Password</h1>
            <p class="auth-subtitle">Create a new password for your account.</p>

            <form action="login.html">
                <input type="password" class="input-field" placeholder="New Password">
                <input type="password" class="input-field" placeholder="Confirm Password">
                <button class="auth-btn">RESET PASSWORD</button>
            </form>

            <a href="login.html" class="back-link">Cancel</a>

        </div>
    </div>
</body>
</html>
