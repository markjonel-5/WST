<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href='https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" href='https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'>
</head>
<body>
    <div class="auth-section">
        <div class="forgot-card">
            
            <div class="forgot-icons"><i class="fi fi-rr-envelope"></i></div>

            <h1 class="auth-title">Forgot Password?</h1>
            <p class="auth-subtitle">Enter your email and we'll send you a code.</p>

            <form action="verify-code.html">
                <input type="email" class="input-field" placeholder="Enter your email">
                <button class="auth-btn">SEND CODE</button>
            </form>

            <a href="login.html" class="back-link">Back to Login</a>

        </div>
    </div>
</body>
</html>
