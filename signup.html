<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href='https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet"
        href='https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-straight/css/uicons-regular-straight.css'>
    <link rel="stylesheet" href='https://cdn-uicons.flaticon.com/3.0.0/uicons-brands/css/uicons-brands.css'>
    <link rel="stylesheet"
        href='https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'>
</head>

<body>
    <div class="navbar-section">
        <div class="nav-wrapper">
            <div class="nav-menu">
                <a href="homepage.html">HOME</a>
                <a href="men.html">MEN</a>
                <a href="women.html">WOMEN</a>
                <a href="kids.html">KIDS</a>
                <a href="new.html">NEW ARRIVAL</a>
            </div>

            <div class="nav-logo">
                <a href="homepage.html"><img src="pace logo orange.png" alt="" class="logo-img"></a>
            </div>

            <div class="nav-icon">
                <div class="search-box">
                    <input type="search" class="search-text" placeholder="Type to search">
                    <button class="search-btn"><i class="fi fi-rr-search"></i></button>
                </div>
                <a href="#"><i class="fi fi-rs-heart"></i></a>
                <a href="#"><i class="fi fi-rr-shopping-cart"></i></a>
                <a href="signup.html"><i class="fi fi-rs-user"></i></a>
            </div>
        </div>
    </div>

    <div class="auth-section">
        <div class="auth-card">

            <div class="auth-image"></div>

            <div class="auth-content">
                <form action="login.html">
                    <h1 class="auth-title">Join <span>PACE</span></h1>
                    <p class="auth-subtitle">Create an account to start shopping.</p>

                    <div class="name-input">
                        <input type="text" class="input-field" placeholder="First Name">
                        <input type="text" class="input-field" placeholder="Last Name">
                    </div>

                    <input type="email" class="input-field" placeholder="Email">
                    <input type="text" class="input-field" placeholder="Username">
                    <input type="password" class="input-field" placeholder="Password">
                    <input type="password" class="input-field" placeholder="Confirm">

                    <button class="auth-btn">CREATE ACCOUNT</button>

                    <div class="auth-divider"><span>OR SIGNUP WITH</span></div>
                    <div class="auth-social">
                        <a href="#"><i class="fi fi-brands-google"></i></a>
                        <a href="#"><i class="fi fi-brands-facebook"></i></a>
                    </div>

                    <p class="bottom-text">Already have an account? <a href="login.html" class="bottom-link">Login</a>
                    </p>
                </form>
            </div>

        </div>
    </div>
</body>

</html>
