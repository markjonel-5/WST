<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGNUP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="signup-box">

        <h1 class="title1">SIGNUP</h1>

        <h2 class="title2">Welcome to PACE! <br>"SLOGAN"</h2>

        <form action="login.html" class="input-box">
            <div class="input-border">
                <input required type="text" name="firstname" id="firstname-input" class="input-field" placeholder="First Name">
            </div>
            <div class="input-border">
                <input required type="text" name="lastname" id="lastname-input" class="input-field" placeholder="Last Name">
            </div>
            <div class="input-border">
                <input required type="email" name="email" id="email-input" class="input-field" placeholder="Email">
            </div>
            <div class="input-border">
                <input required type="text" name="username" id="username-input" class="input-field" placeholder="Username">
            </div>
            <div class="input-border">
                <input required type="password" name="password" id="password-input" class="input-field" placeholder="Password">
            </div>
            <div class="input-border">
                <input required type="password" name="cpassword" id="cpassword-input" class="input-field" placeholder="Confirm Password">
            </div>
            <button type="submit" class="btn">SIGNUP</button>

        </form>
        
        <p>Already have an Account? <a href="login.html" class="link">Login</a></p>

    </div>
</body>
</html>
