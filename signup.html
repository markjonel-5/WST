<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href='https://cdn-uicons.flaticon.com/3.0.0/uicons-brands/css/uicons-brands.css'>
    <link rel="stylesheet" href='https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'>
</head>

<body>
    <div class="auth-section">
        <div class="auth-card">

            <div class="auth-image"></div>

            <div class="auth-content">
                <form action="login.html">
                    <h1 class="auth-title">Join <span>PACE</span></h1>
                    <p class="auth-subtitle">Create an account to start shopping.</p>

                    <div class="name-input">
                        <input type="text" class="input-field" placeholder="First Name">
                        <input type="text" class="input-field" placeholder="Last Name">
                    </div>

                    <input type="text" class="input-field" placeholder="Username">
                    <input type="email" class="input-field" placeholder="Email">
                    <input type="password" class="input-field" placeholder="Password">
                    <input type="password" class="input-field" placeholder="Confirm">

                    <button class="auth-btn">CREATE ACCOUNT</button>

                    <div class="auth-divider"><span>OR LOGIN WITH</span></div>
                    <div class="auth-social">
                        <a href="#"><i class="fi fi-brands-google"></i></a>
                        <a href="#"><i class="fi fi-brands-facebook"></i></a>
                    </div>

                    <p class="bottom-text">Already have an account? <a href="login.html" class="bottom-link">Login</a></p>
                </form>
            </div>

        </div>
    </div>
</body>

</html>
