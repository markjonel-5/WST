<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href='https://cdn-uicons.flaticon.com/3.0.0/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <link rel="stylesheet" href='https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap'>
</head>
<body>
    <div class="auth-section">
        <div class="forgot-card">
            
            <div class="forgot-icons"><i class="fi fi-rr-shield-check"></i></div>

            <h1 class="auth-title">Enter Code</h1>
            <p class="auth-subtitle">We sent a code to your email. Enter it below.</p>

            <form action="reset-password.html">
                <input type="number" class="input-field" placeholder="Enter 6-digit code">
                <button class="auth-btn">VERIFY</button>
            </form>

            <a href="forgot-password.html" class="back-link">Resend Code</a>

        </div>
    </div>
</body>
</html>
