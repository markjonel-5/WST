<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="signup-box">

        <h1 class="title1">LOGIN</h1>

        <h2 class="title2">Welcome to PACE! <br>"SLOGAN"</h2>

        <form action="signup.html" class="input-box">

            <div class="input-border">
                <input required type="text" name="username" id="username-input" class="input-field" placeholder="Username">
            </div>
            <div class="input-border">
                <input required type="password" name="password" id="password-input" class="input-field" placeholder="Password">
            </div>
            <button type="submit" class="btn">LOGIN</button>
        </form>

        <div class="forgot-box">
            <a href="" class="forgot">Forgot Password?</a>
        </div>
        
        <label>Don't have an Account? <a href="signup.html" class="link">Signup</a></label>

    </div>
</body>
</html>
